[env:lolin_c3_mini]
platform = espressif32
board = lolin_c3_mini
framework = arduino
lib_deps =
	olikraus/Ucglib@^1.5.2
	olikraus/U8g2@^2.36.4
	Wire
	janelia-arduino/TMC2209@^10.1.0
	makuna/NeoPixelBus@^2.8.3
upload_speed = 460800
monitor_speed = 460800
